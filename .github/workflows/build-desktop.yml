name: Build Desktop Releases

on:
  workflow_dispatch:
    inputs:
      target:
        description: Select which desktop artifact to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || (github.event.inputs.target == 'windows' && matrix.os == 'windows-latest') || (github.event.inputs.target == 'macos' && matrix.os == 'macos-latest')
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            build_script: build:mac
            artifact_name: PhotoPainter-Converter-macOS
          - os: windows-latest
            name: Windows
            build_script: build:win
            artifact_name: PhotoPainter-Converter-Windows

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run ${{ matrix.build_script }}

      - name: Package macOS app bundle
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "PhotoPainter Converter.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "macOS app bundle not found in release/"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release/PhotoPainter-Converter-macOS.zip"

      - name: Upload macOS release artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/PhotoPainter-Converter-macOS.zip
          if-no-files-found: error

      - name: Upload Windows release artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**/*.exe
          if-no-files-found: error

  publish-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
          generate_release_notes: true
