name: Build Desktop Releases

on:
  workflow_dispatch:
    inputs:
      target:
        description: Select which desktop artifact to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'macos'
    name: Build macOS
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run build:mac

      - name: Package macOS app bundle
        run: |
          APP_PATH=$(find release -maxdepth 3 -type d -name "PhotoPainter Converter.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "macOS app bundle not found in release/"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release/PhotoPainter-Converter-macOS.zip"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoPainter-Converter-macOS
          path: release/PhotoPainter-Converter-macOS.zip
          if-no-files-found: error

  build-windows:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows'
    name: Build Windows
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run build:win

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoPainter-Converter-Windows
          path: release/**/*.exe
          if-no-files-found: error

  publish-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
          generate_release_notes: true
